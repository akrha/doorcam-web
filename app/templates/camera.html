<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>来客カメラ</title>
  <style>
    :root {
      --bg: #f3efe7;
      --bg-accent: #e5dccf;
      --panel: rgba(255, 252, 246, 0.9);
      --panel-strong: #fffaf3;
      --text: #2b241d;
      --muted: #6f6358;
      --line: rgba(76, 61, 45, 0.14);
      --shadow: 0 18px 48px rgba(65, 48, 29, 0.12);
      --playing: #2f7d62;
      --connecting: #b7832f;
      --error: #b34b4b;
      --idle: #7c736d;
      --action: #215f84;
      --action-strong: #184862;
      --danger: #9f413d;
      --danger-strong: #823431;
      --secondary: #e7ded0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.55), transparent 65%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 112px;
    }

    .hero {
      margin-bottom: 16px;
      padding: 18px 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 250, 243, 0.92), rgba(246, 238, 228, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .status-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      margin: 16px 0;
      padding: 16px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: 0 8px 26px rgba(85, 63, 39, 0.08);
    }

    .status-icon {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    .status-content {
      min-width: 0;
    }

    .status-label {
      display: inline-block;
      margin-bottom: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .status-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }

    .status-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .status-playing .status-icon,
    .status-playing .status-label {
      background: var(--playing);
    }

    .status-connecting .status-icon,
    .status-connecting .status-label {
      background: var(--connecting);
    }

    .status-error .status-icon,
    .status-error .status-label {
      background: var(--error);
    }

    .status-idle .status-icon,
    .status-idle .status-label {
      background: var(--idle);
    }

    .video-card {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 28px;
      background: rgba(255, 250, 243, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .video-frame {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background:
        radial-gradient(circle at top, rgba(74, 130, 161, 0.28), transparent 42%),
        linear-gradient(180deg, #1e252d 0%, #050607 100%);
      aspect-ratio: 4 / 3;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: transparent;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(13, 15, 17, 0.16), rgba(13, 15, 17, 0.62));
      color: #fffaf3;
      transition: opacity 180ms ease;
    }

    .video-overlay[data-visible="false"] {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-card {
      max-width: 280px;
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: rgba(24, 27, 31, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .overlay-spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .overlay-card[data-state="playing"] .overlay-spinner,
    .overlay-card[data-state="idle"] .overlay-spinner {
      display: none;
    }

    .overlay-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 800;
    }

    .overlay-copy {
      margin: 0;
      color: rgba(255, 250, 243, 0.88);
      font-size: 14px;
      line-height: 1.6;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-card {
      padding: 14px 15px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(85, 63, 39, 0.06);
    }

    .meta-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .meta-value {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
    }

    .hint {
      margin: 0 0 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 250, 243, 0.72);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(243, 239, 231, 0), rgba(243, 239, 231, 0.94) 28%, rgba(243, 239, 231, 0.98) 100%);
    }

    .actions-inner {
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      padding: 10px;
      border-radius: 22px;
      background: rgba(255, 251, 245, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 16px 36px rgba(79, 61, 39, 0.14);
      backdrop-filter: blur(14px);
    }

    button {
      min-height: 52px;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
    }

    button:active {
      transform: translateY(1px) scale(0.995);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, var(--action), var(--action-strong));
    }

    .btn-stop {
      color: #fff;
      background: linear-gradient(180deg, var(--danger), var(--danger-strong));
    }

    .btn-secondary {
      min-width: 58px;
      color: var(--text);
      background: var(--secondary);
    }

    .debug-panel {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: #2b241d;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .debug-panel[hidden] {
      display: none;
    }

    pre {
      margin: 0;
      color: #f6eee4;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding-top: 14px;
      }

      h1 {
        font-size: 26px;
      }

      .status-card {
        grid-template-columns: 1fr;
      }

      .status-icon {
        width: 42px;
        height: 42px;
        font-size: 21px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .actions-inner {
        grid-template-columns: 1fr 1fr auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>来客カメラ</h1>
    </section>

    <section id="statusCard" class="status-card status-idle">
      <div id="statusIcon" class="status-icon">○</div>
      <div class="status-content">
        <div id="statusLabel" class="status-label">STANDBY</div>
        <h2 id="statusTitle" class="status-title">待機しています</h2>
        <div id="statusSub" class="status-sub">ページを開くと自動でカメラを起動します。</div>
      </div>
    </section>

    <section class="video-card">
      <div class="video-frame">
        <video id="video" autoplay muted playsinline></video>
        <div id="videoOverlay" class="video-overlay" data-visible="true">
          <div id="overlayCard" class="overlay-card" data-state="connecting">
            <div class="overlay-spinner"></div>
            <p id="overlayTitle" class="overlay-title">カメラを準備しています</p>
            <p id="overlayCopy" class="overlay-copy">映像が出るまで数秒かかることがあります。</p>
          </div>
        </div>
      </div>
    </section>

    <section class="meta-grid">
      <article class="meta-card">
        <p class="meta-label">いまの状態</p>
        <p id="quickStatus" class="meta-value">起動待ち</p>
      </article>
    </section>

    <p class="hint">来客があったときに、スマホですぐ様子を確認できるようにした画面です。見たいときに開いて、終わったら止めるだけで使えます。映像が止まって見えるときは、もう一度「見る」を押してください。</p>

    <div id="debugPanel" class="debug-panel" hidden>
      <pre id="debugText">読み込み中...</pre>
    </div>
  </div>

  <div class="actions">
    <div class="actions-inner">
      <button id="startBtn" class="btn-primary">見る</button>
      <button id="stopBtn" class="btn-stop">停止</button>
      <button id="debugBtn" class="btn-secondary" aria-expanded="false">詳細</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
  <script>
    const videoEl = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const debugBtn = document.getElementById('debugBtn');
    const debugPanel = document.getElementById('debugPanel');
    const debugText = document.getElementById('debugText');

    const statusCard = document.getElementById('statusCard');
    const statusIcon = document.getElementById('statusIcon');
    const statusLabel = document.getElementById('statusLabel');
    const statusTitle = document.getElementById('statusTitle');
    const statusSub = document.getElementById('statusSub');
    const quickStatus = document.getElementById('quickStatus');

    const videoOverlay = document.getElementById('videoOverlay');
    const overlayCard = document.getElementById('overlayCard');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayCopy = document.getElementById('overlayCopy');

    const hlsUrl = '/hls/index.m3u8';

    let hls = null;
    let pingTimer = null;
    let statusTimer = null;
    let debugVisible = false;
    let lastStatus = null;
    let playbackStarted = false;
    let starting = false;
    let attaching = false;
    const startupSegmentsFallback = 2;

    function setOverlay(state, title, copy) {
      overlayCard.dataset.state = state;
      overlayTitle.textContent = title;
      overlayCopy.textContent = copy;
      videoOverlay.dataset.visible = state === 'playing' ? 'false' : 'true';
    }

    function setUiState(state, subtext = '') {
      statusCard.className = 'status-card';
      statusCard.classList.add(`status-${state}`);

      if (state === 'connecting') {
        statusIcon.textContent = '…';
        statusLabel.textContent = 'CONNECTING';
        statusTitle.textContent = '映像を準備しています';
        quickStatus.textContent = '接続中';
        setOverlay('connecting', 'カメラを準備しています', subtext || '映像が出るまで数秒かかることがあります。');
      } else if (state === 'playing') {
        statusIcon.textContent = '✓';
        statusLabel.textContent = 'LIVE';
        statusTitle.textContent = 'いま確認できます';
        quickStatus.textContent = '表示中';
        setOverlay('playing', '', '');
      } else if (state === 'error') {
        statusIcon.textContent = '!';
        statusLabel.textContent = 'ERROR';
        statusTitle.textContent = '映像を表示できませんでした';
        quickStatus.textContent = 'エラー';
        setOverlay('error', '映像を表示できませんでした', subtext || '「見る」を押して再接続してください。');
      } else {
        statusIcon.textContent = '○';
        statusLabel.textContent = 'STANDBY';
        statusTitle.textContent = '待機しています';
        quickStatus.textContent = '停止中';
        setOverlay('idle', '映像は停止中です', subtext || '確認したいときに「見る」を押してください。');
      }

      statusSub.textContent = subtext || '';
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      if (!res.ok) {
        throw new Error(`${url} ${res.status}`);
      }
      return res.json();
    }

    function destroyPlayer() {
      playbackStarted = false;
      attaching = false;

      if (hls) {
        hls.destroy();
        hls = null;
      }

      videoEl.pause();
      videoEl.removeAttribute('src');
      videoEl.load();
    }

    async function tryPlayVideo() {
      try {
        await videoEl.play();
        playbackStarted = true;
        setUiState('playing', '映像を表示しています。');
      } catch (e) {
        console.error('play() failed', e);
        setUiState('connecting', '映像の準備中です...');
      }
    }

    function shouldUseNativeHls() {
      const canUseNativeHls = !!videoEl.canPlayType('application/vnd.apple.mpegurl');

      if (!canUseNativeHls) {
        return false;
      }

      if (window.Hls && Hls.isSupported()) {
        return false;
      }

      return true;
    }

    function getMediaErrorDetails() {
      const mediaError = videoEl.error;

      if (!mediaError) {
        return 'unknown';
      }

      const codeMap = {
        1: 'MEDIA_ERR_ABORTED',
        2: 'MEDIA_ERR_NETWORK',
        3: 'MEDIA_ERR_DECODE',
        4: 'MEDIA_ERR_SRC_NOT_SUPPORTED'
      };

      return `${codeMap[mediaError.code] || 'MEDIA_ERR_UNKNOWN'} (${mediaError.code})`;
    }

    function attachVideo() {
      if (attaching) {
        return;
      }

      attaching = true;
      destroyPlayer();
      attaching = true;

      const src = hlsUrl;

      if (shouldUseNativeHls()) {
        videoEl.addEventListener('loadedmetadata', async () => {
          await tryPlayVideo();
          attaching = false;
        }, { once: true });

        videoEl.addEventListener('canplay', async () => {
          await tryPlayVideo();
          attaching = false;
        }, { once: true });

        videoEl.src = src;
        videoEl.load();
        return;
      }

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          lowLatencyMode: false,
          backBufferLength: 30,
          liveSyncDurationCount: 2,
          liveMaxLatencyDurationCount: 4,
          manifestLoadingTimeOut: 10000,
          manifestLoadingMaxRetry: 3,
          levelLoadingTimeOut: 10000,
          levelLoadingMaxRetry: 3,
          fragLoadingTimeOut: 20000,
          fragLoadingMaxRetry: 3
        });

        hls.on(Hls.Events.MEDIA_ATTACHED, function () {
          hls.loadSource(src);
        });

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          tryPlayVideo();
          attaching = false;
        });

        hls.on(Hls.Events.ERROR, function (_event, data) {
          console.error('HLS error', data);

          if (!data.fatal) {
            return;
          }

          attaching = false;

          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hls.startLoad();
            setUiState('connecting', '映像を再接続しています...');
            return;
          }

          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
            setUiState('connecting', '映像を復旧しています...');
            return;
          }

          setUiState('error', '「見る」を押して再接続してください。');
        });

        hls.attachMedia(videoEl);
        return;
      }

      attaching = false;
      setUiState('error', 'このブラウザでは映像を再生できません。');
    }

    async function waitUntilReady() {
      for (let i = 0; i < 30; i++) {
        const st = await fetchJson('/api/status');
        lastStatus = st;
        renderDebug(st);
        const startupSegments = st.startup_segments || startupSegmentsFallback;

        if (st.running && st.playlist_exists && (st.segment_count || 0) >= startupSegments) {
          return true;
        }

        await new Promise(r => setTimeout(r, 500));
      }

      return false;
    }

    async function startCamera() {
      if (starting) {
        return;
      }

      starting = true;
      setUiState('connecting', 'カメラを起動しています...');

      try {
        await fetchJson('/api/start', { method: 'POST' });

        const ready = await waitUntilReady();
        if (!ready) {
          setUiState('error', '起動しましたが、映像の準備がまだできていません。');
          return;
        }

        attachVideo();
      } catch (e) {
        console.error(e);
        setUiState('error', '起動に失敗しました。しばらくしてからもう一度試してください。');
      } finally {
        starting = false;
      }
    }

    async function stopCamera() {
      try {
        await fetchJson('/api/stop', { method: 'POST' });
      } catch (e) {
        console.error(e);
      }

      destroyPlayer();
      setUiState('idle', '映像を止めています。');
    }

    async function sendPing() {
      try {
        await fetchJson('/api/ping', { method: 'POST' });
      } catch (e) {
        console.error('ping failed', e);
      }
    }

    function renderDebug(st) {
      if (!st) {
        return;
      }

      if (st.error) {
        debugText.textContent = `error: ${st.error}`;
        return;
      }

      debugText.textContent =
        `running: ${st.running}\n` +
        `playlist_exists: ${st.playlist_exists}\n` +
        `segment_count: ${st.segment_count}\n` +
        `hls_time: ${st.hls_time}\n` +
        `startup_segments: ${st.startup_segments}\n` +
        `idle_seconds: ${st.idle_seconds}\n` +
        `timeout_seconds: ${st.timeout_seconds}\n` +
        `last_seen: ${st.last_seen}\n` +
        `camera_device: ${st.camera_device}\n` +
        `playbackStarted: ${playbackStarted}\n` +
        `video.paused: ${videoEl.paused}\n` +
        `video.readyState: ${videoEl.readyState}\n` +
        `starting: ${starting}\n` +
        `attaching: ${attaching}`;
    }

    async function refreshStatus() {
      try {
        const st = await fetchJson('/api/status');
        lastStatus = st;
        renderDebug(st);

        if (!st.running) {
          if (statusTitle.textContent !== '映像を表示できませんでした' && statusTitle.textContent !== '待機しています') {
            setUiState('idle', '映像は停止中です。');
          }
          return;
        }

        if (st.running && !st.playlist_exists) {
          if (!playbackStarted) {
            setUiState('connecting', 'カメラを起動しています...');
          }
          return;
        }

        if (st.running && st.playlist_exists) {
          if (!playbackStarted && (st.segment_count || 0) < (st.startup_segments || startupSegmentsFallback)) {
            setUiState('connecting', '映像を安定して再生するため準備しています...');
          }
          return;
        }
      } catch (e) {
        console.error(e);
        renderDebug({ error: e.message });
      }
    }

    debugBtn.addEventListener('click', () => {
      debugVisible = !debugVisible;
      debugPanel.hidden = !debugVisible;
      debugBtn.textContent = debugVisible ? '閉じる' : '詳細';
      debugBtn.setAttribute('aria-expanded', debugVisible ? 'true' : 'false');
      renderDebug(lastStatus);
    });

    startBtn.addEventListener('click', () => {
      startCamera();
    });

    stopBtn.addEventListener('click', () => {
      stopCamera();
    });

    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon('/api/ping');
    });

    videoEl.addEventListener('playing', () => {
      playbackStarted = true;
      setUiState('playing', '映像を表示しています。');
    });

    videoEl.addEventListener('waiting', () => {
      if (!playbackStarted) {
        setUiState('connecting', '映像を読み込み中です...');
      }
    });

    videoEl.addEventListener('error', () => {
      console.error('video error', getMediaErrorDetails(), videoEl.currentSrc);
      destroyPlayer();
      setUiState('error', '映像の表示中にエラーが発生しました。「見る」を押してください。');
    });

    pingTimer = setInterval(sendPing, 30000);
    statusTimer = setInterval(refreshStatus, 5000);

    setUiState('connecting', 'カメラを起動しています...');
    refreshStatus();
    startCamera();
  </script>
</body>
</html>
